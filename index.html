<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bangalore-eating-game/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Bangalore Eating Game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; touch-action: none; }
      #game-container { width: 100%; height: 100%; position: relative; }
      #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
      #ui-overlay > * { pointer-events: auto; }

      /* HUD */
      #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'Segoe UI', system-ui, sans-serif; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
      #timer { font-size: 28px; font-weight: 700; }
      #score { font-size: 22px; font-weight: 600; }
      #size-label { font-size: 16px; opacity: 0.8; }

      /* Leaderboard sidebar */
      #leaderboard { position: absolute; top: 60px; right: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px 14px; min-width: 140px; }
      #leaderboard h3 { font-family: system-ui; color: #fff; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
      .lb-entry { display: flex; justify-content: space-between; font-family: system-ui; color: #fff; font-size: 14px; padding: 3px 0; }
      .lb-entry.player { color: #4fc3f7; font-weight: 700; }

      /* Main menu */
      #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); z-index: 100; }
      #main-menu h1 { font-family: system-ui; font-size: 48px; font-weight: 900; color: #fff; margin-bottom: 8px; text-align: center; }
      #main-menu .subtitle { font-family: system-ui; font-size: 18px; color: #4fc3f7; margin-bottom: 40px; }
      #play-btn { padding: 16px 64px; font-size: 24px; font-weight: 700; border: none; border-radius: 50px; background: linear-gradient(135deg, #e91e63, #ff5722); color: white; cursor: pointer; font-family: system-ui; transition: transform 0.2s; box-shadow: 0 4px 20px rgba(233,30,99,0.4); }
      #play-btn:hover { transform: scale(1.05); }
      #city-label { font-family: system-ui; font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 20px; }

      /* Game over screen */
      #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; }
      #game-over h2 { font-family: system-ui; font-size: 42px; font-weight: 900; color: #fff; margin-bottom: 10px; }
      #game-over .final-score { font-family: system-ui; font-size: 24px; color: #4fc3f7; margin-bottom: 8px; }
      #game-over .final-rank { font-family: system-ui; font-size: 18px; color: #aaa; margin-bottom: 30px; }
      #restart-btn { padding: 14px 48px; font-size: 20px; font-weight: 700; border: none; border-radius: 50px; background: linear-gradient(135deg, #4caf50, #2e7d32); color: white; cursor: pointer; font-family: system-ui; transition: transform 0.2s; }
      #restart-btn:hover { transform: scale(1.05); }

      /* Loading screen */
      #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; z-index: 200; }
      #loading-screen .loading-text { font-family: system-ui; font-size: 20px; color: #fff; margin-bottom: 20px; }
      .progress-bar { width: 240px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
      .progress-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.3s; }

      /* Sound toggle */
      #sound-btn { position: absolute; bottom: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(0,0,0,0.4); color: white; font-size: 20px; cursor: pointer; z-index: 15; }

      /* Size up notification */
      #size-up { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-family: system-ui; font-size: 36px; font-weight: 900; color: #ffeb3b; text-shadow: 0 3px 8px rgba(0,0,0,0.6); pointer-events: none; z-index: 20; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; opacity: 0; white-space: nowrap; }
      #size-up.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

      /* Controls hint */
      .controls-hint { font-family: system-ui; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 12px; }

      /* Minimap */
      #minimap { position: absolute; bottom: 12px; left: 12px; width: 100px; height: 100px; background: rgba(0,0,0,0.4); border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; }
      #minimap canvas { width: 100%; height: 100%; }
    </style>
    <script type="module" crossorigin src="/bangalore-eating-game/assets/index-BQzltyoT.js"></script>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay">
        <!-- HUD -->
        <div id="hud" style="display:none;">
          <div>
            <div id="timer">2:00</div>
            <div id="size-label">Size: XS</div>
          </div>
          <div id="score">Score: 0</div>
        </div>
        <!-- Leaderboard -->
        <div id="leaderboard" style="display:none;"></div>
        <!-- Main Menu -->
        <div id="main-menu">
          <h1>Bangalore<br/>Eating Game</h1>
          <div class="subtitle">Swallow the city!</div>
          <button id="play-btn">PLAY</button>
          <div class="controls-hint">WASD or Arrow Keys to move | Touch to play on mobile</div>
          <div id="city-label">Bangalore, India</div>
        </div>
        <!-- Game Over -->
        <div id="game-over">
          <h2>Time's Up!</h2>
          <div class="final-score" id="final-score">Score: 0</div>
          <div class="final-rank" id="final-rank">Rank: #1</div>
          <button id="restart-btn">PLAY AGAIN</button>
        </div>
        <!-- Size Up Notification -->
        <div id="size-up"></div>
        <!-- Sound Toggle -->
        <button id="sound-btn">🔊</button>
        <!-- Minimap -->
        <div id="minimap" style="display:none;"><canvas id="minimap-canvas" width="100" height="100"></canvas></div>
        <!-- Loading -->
        <div id="loading-screen">
          <div class="loading-text">Loading Bangalore...</div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
      </div>
    </div>
  </body>
</html>
